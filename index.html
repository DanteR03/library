<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Library</title>
  <link rel="stylesheet" href="style.css">
  <script src="library.js" defer></script>
</head>

<body>
  <div class="header-container">
    <h1>Library</h1>
    <button class="newbook">New book</button>
  </div>

  <div class="main-container">
    <div class="book">
      <table>
        <tr>
          <th>Title</th>
          <th>Author</th>
          <th>Pages</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
        <tr>
          <td>The Hobbit</td>
          <td>J.R.R. Tolkien</td>
          <td>300</td>
          <td>Read</td>
          <td>
            <button>Delete</button>
            <button>Edit</button>
          </td>
        </tr>
      </table>
    </div>
  </div>

  <div class="footer-container">
    <p>Made by DanteR03 for The Odin Project</p>
  </div>
</body>

</html>
